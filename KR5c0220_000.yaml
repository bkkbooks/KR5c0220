body:
  text: 莊周氣訣解莊子曰指窮於為薪火傳也窮盡也為薪猶前薪也將以指盡前薪之理故火傳而不滅心得納養之中故命續而不絶夫養生乃生之所以生也不知其盡也夫時不再來命不一停故人之生也乃一息一得耳向息非今息故納養而命續前火非後火故薪傳而火續由夫納養得理其極世豈知其生而盡哉隂符疏曰太公賊命以一銷天下用之以味何也一者心稟於自然變化之元故善賊命者用銷息杜欲還真故曰長年轉成神化是一銷之義也疏曰太公聖人謂之五賊天下謂之五德人食五味死無有怨而棄者心之所味亦然夫聖人以至真之體觀乎五者皆欲也故謂之五賊天下之人食五味者死無有怨而棄者心之所味亦然蓋言衆庶貪溺五味終也五欲使自為也人皆欲其生欲其飬欲其成欲其通欲其安隨而與之因而制之天下奔逐其性咸獲所欲特謂造化自成我不知自為利也其天下之人不逹其要者但以味適口充腹飽胃以養其性命恐隔滋味而巳然其腑藏長欲蒸心亂神反資百疾以至夭殂故太公曰人食五味而死無有怨而棄之不食五味者仙真也廣成子以為積火焚五毒五毒者五味也若去五味盡可以長生以此驗之明矣豫以為積火則心積鍊其心陽和氣充布氣流液如心在陽故五味消滋味自淡也夫欲神仙當先營氣能益能易名上仙籍不益不易不離死厄但能握固閉氣吞液氣化為血血化為精精化為神神化為液液化為骨胎結丹田綿綿長存行之不倦神光體溢凡咽氣皆須喉中徐徐咽不得泄泄即令人發煩每咽從容中間隔十息停歇又一咽彌佳若但咽之則易奔出初服氣必須心意坦然無疑無畏必大勝若懷疑惑即正氣難行蓋須安心決志耳凡服氣四體調和必須情意欣樂自足不羡一物事日暢一日凡食穀服氣雖得食食不得飽飽即氣住氣住即逆出彌忌葷辛須坦然棄滋味自抑捺不抑捺即心不正氣不行也凡服氣日别飮少藥酒亦妙并煮薤食之益氣若氣不下喫少許薑蜜湯能遊心於玄漠百物不思至誠感神則自然飽足絶粒久視一無所妨服氣縱體中胸心問不安亦非害事久久日勝一日矣服氣次不得食肉及一切果子生菜若未能全斷肉味須除十二屬亦腹中不安穩又滓穢腸中正氣難行且漸空腹但自忍抑久自覺神情有異四體漸勝眼中自識善惡澄心定志三七日即內視腸胃通鑒五藏歷歷使用妙不可言凡身中氣常從口鼻中出令制使不出仙訣曰欲得不死腸中無滓欲得長生五藏當清欲得不老還精補腦蓋為行道也初學一日一夜不可忘四時六時內自通融作慣行住坐卧縱橫並得服氣飽須閉氣令遍身中次想氣覺氣道成每欲咽氣先瞑目叩齒握固訖存五藏各為獸肺化為白麟心化為赤麟肝化為青麟脾化為黃麟腎化為黑麟各吐本方正色濛濛縈繞狀如五雲入于口中即鼓頰受之如常咽法畢即摩拭面目七遍定心叩齒七通咒曰太霞發暉雲霧四千結氣宛屈五色洞天神咽合氣金石華真靄鬱紫空鍊形保全出景藏幽五雲合分合明太虛時乘六雲和攝我身上升九天咒畢又叩齒七通咽液七遍無為無作安神定志無與氣爭乃候出息便鼓頰如嬰兒含乳而咽之定心意送至丹田察其氣在左邊下歷歷聞之如水之度坎聾極分明乃為一氣如此良久又送一氣覺似滿即休不得過多日久通乃知也初服氣皆因出息時住其息少時似閉滿其息出時三分出二又住少時想滿腹中時服之朝暮子午是也覺滿欲出咬少許甘草桂心咽液亦得漸散丹田未滿亦不到滿也元氣下時自然有少悶抑莫令出凡氣欲從口鼻中衝出即須強咽津液直要加力小腹從容抑下如不可禁即合返取所出氣還鼓腮努小腹咽入漸固久久自不出矣莊周氣訣解終
